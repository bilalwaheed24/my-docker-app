name: Build and Push to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: CODE TESTING
  # ==========================================
  test-code:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Run HTML Code Test
      run: |
        echo "Starting automated testing on code..."
        if grep -q "<html>\|<h1>\|<p>" index.html; then
          echo "Test Passed: Valid HTML tags found!"
        else
          echo "Test Failed: No valid HTML structure found!" && exit 1
        fi

  # ==========================================
  # JOB 2: DOCKER BUILD & PUSH (Runs only if Job 1 passes)
  # ==========================================
  build-and-push:
    runs-on: ubuntu-latest
    needs: test-code # Yeh line Docker build ko tab tak rokegi jab tak test pass nahi hota
    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_HUB_USERNAME }}/my-docker-app:latest
