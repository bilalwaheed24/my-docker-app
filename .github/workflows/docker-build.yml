name: Build and Push to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: TEST
  # ==========================================
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Run HTML Code Test
      run: |
        echo "Running automated tests..."
        if grep -q "<html>\|<h1>\|<p>" index.html; then
          echo "Test Passed: Code is perfectly fine!"
        else
          echo "Test Failed: Code issues found!" && exit 1
        fi

  # ==========================================
  # JOB 2: BUILD
  # ==========================================
  build:
    runs-on: ubuntu-latest
    needs: test # Yeh tabhi chalega jab test job pass hogi
    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Build Docker Image Locally
      run: |
        echo "Building Docker Image locally to verify..."
        docker build -t my-docker-app:local .

  # ==========================================
  # JOB 3: PUSH
  # ==========================================
  push:
    runs-on: ubuntu-latest
    needs: build # Yeh tabhi chalega jab build job pass hogi
    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Build and Push to Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_HUB_USERNAME }}/my-docker-app:latest
