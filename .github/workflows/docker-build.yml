name: Build, Push and Deploy

on:
  push:
    branches: [ "main" ]

# GitHub Pages par deploy karne ke liye permissions zaroori hain
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ==========================================
  # JOB 1: TEST
  # ==========================================
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Run HTML Code Test
      run: |
        echo "Running automated tests..."
        if grep -q "<html>\|<h1>\|<p>" index.html; then
          echo "Test Passed!"
        else
          echo "Test Failed!" && exit 1
        fi

  # ==========================================
  # JOB 2: BUILD
  # ==========================================
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Build Docker Image Locally
      run: docker build -t my-docker-app:local .

  # ==========================================
  # JOB 3: PUSH
  # ==========================================
  push:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Build and Push to Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_HUB_USERNAME }}/my-docker-app:latest

  # ==========================================
  # JOB 4: DEPLOY (Runs only if Push passes)
  # ==========================================
  deploy:
    runs-on: ubuntu-latest
    needs: push # Yeh tabhi chalega jab push successful hoga
    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }} # Yeh GitHub ka apna default token hai, aapko manually add nahi karna padega
        publish_dir: . 
